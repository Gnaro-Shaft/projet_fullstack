# fly.toml app configuration file generated for projet-fullstack on 2026-07-22T18:46:52+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'projet-fullstack'
primary_region = 'cdg'

[build]
[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[mounts]
  source = 'data'
  destination = '/data'

[env]
  AUDIT_LOG_PATH = '/data/audit/chat_audit.jsonl'
  EVAL_HISTORY_PATH = '/data/eval_history.json'

