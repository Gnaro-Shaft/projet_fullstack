# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Test and deploy Fly apps
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run test suite
        run: python -m pytest -q

  deploy:
    name: Deploy backend and frontend
    needs: test
    runs-on: ubuntu-latest
    concurrency: fly-deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy FastAPI backend
        run: flyctl deploy --config fly.toml --app projet-fullstack --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKEND }}
      - name: Deploy Streamlit frontend
        run: flyctl deploy --config fly.frontend.toml --app trustrag-frontend --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FRONTEND }}
