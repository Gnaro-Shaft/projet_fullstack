name: Test and deploy Fly apps
on:
  push:
    branches:
      - main
jobs:
  test:
    name: Unit + integration tests
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:v1.16.3
        ports:
          - 6333:6333
    env:
      QDRANT_URL: http://localhost:6333
      QDRANT_COLLECTION: test_documents
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Lint (ruff)
        run: python -m ruff check --output-format=github .
      - name: Coverage + unit tests
        run: python -m pytest tests/ -m "not integration" --cov --cov-report=term --cov-report=xml
      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -q --timeout 60
      - name: Security scan (pip-audit)
        run: python -m pip install pip-audit && pip-audit --strict --desc -r requirements.txt

  quality:
    name: Golden set evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MISTRAL_URL: ${{ secrets.MISTRAL_URL }}
      MISTRAL_MODEL: ${{ secrets.MISTRAL_MODEL }}
      MISTRAL_EMBEDDING_MODEL: ${{ secrets.MISTRAL_EMBEDDING_MODEL }}
      MISTRAL_MAX_RETRIES: "5"
      BACKEND_URL: https://projet-fullstack.fly.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Evaluate golden set
        run: python -m scripts.evaluate_rag_quality --print --threshold 0.70 --min-faithfulness 3.5 --min-hallucination 3.5
      - name: Evaluate retrieval (Hit@1/3/5 + MRR)
        run: python -m scripts.evaluate_golden_set --top-k 5
      - name: Upload QA reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            data/evaluation/rag_quality_report.json
            data/eval_history.json

  deploy:
    name: Deploy backend and frontend
    needs: [test, quality]
    runs-on: ubuntu-latest
    concurrency: fly-deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy FastAPI backend
        run: flyctl deploy --config fly.toml --app projet-fullstack --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_BACKEND }}
      - name: Deploy Streamlit frontend
        run: flyctl deploy --config fly.frontend.toml --app trustrag-frontend --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_FRONTEND }}
      - name: Smoke test
        run: |
          sleep 10
          curl -sSf --max-time 15 https://projet-fullstack.fly.dev/ping | grep -q pong
          echo "✅ Smoke test passed"
