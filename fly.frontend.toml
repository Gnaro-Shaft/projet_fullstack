# fly.toml app configuration file generated for trustrag-frontend on 2026-07-22T18:57:59+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'trustrag-frontend'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile.streamlit'

[http_service]
  internal_port = 8501
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
