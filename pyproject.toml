[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = ["integration"]
addopts = "-q --tb=short"

[tool.coverage.run]
source = ["app", "scripts"]
omit = ["*/tests/*"]

[tool.coverage.report]
fail_under = 50
