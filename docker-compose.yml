services:
  api:
    build: .
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${FASTAPI_PORT:-8000}:8000"
    depends_on:
      qdrant:
        condition: service_healthy
  qdrant:
    image: qdrant/qdrant:v1.16.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_data:
